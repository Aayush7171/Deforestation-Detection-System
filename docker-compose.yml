version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - EE_PROJECT_ID=${EE_PROJECT_ID:-deforestation-calculation}
      - PORT=5000
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
